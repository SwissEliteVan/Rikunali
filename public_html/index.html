                        <button
                            key={lang.code}
                            onClick={() => setLang(lang.code)}

                                currentLang === lang.code 
                                ? 'bg-emerald-800 text-white'

                            }`}
                        >

            );

            const [isVisible, setIsVisible] = useState(false);

                const consent = localStorage.getItem('rikunali-cookie-consent');
                if (!consent) {
                    setIsVisible(true);
                }
            }, []);

            const handleAction = (choice) => {
                localStorage.setItem('rikunali-cookie-consent', choice);
                setIsVisible(false);
            };

            if (!isVisible) return null;

            return (
                <div className="fixed bottom-0 left-0 w-full bg-stone-900 text-white p-4 z-50 shadow-lg border-t border-stone-700 flex flex-col md:flex-row items-center justify-between gap-4 fade-in">

                            {t.cookies.decline}
                        </button>
                        <button onClick={() => handleAction('accepted')} className="bg-emerald-700 hover:bg-emerald-600 text-white px-6 py-2 rounded-full text-sm font-semibold transition">

            const t = content[lang];

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Logique d'affichage de la popup
            useEffect(() => {
                const hasSeenPopup = sessionStorage.getItem('rikunali-promo-popup');
                if (!hasSeenPopup) {
                    const timer = setTimeout(() => {
                        setShowPromoPopup(true);
                    }, 5000); // 5 secondes de délai
                    return () => clearTimeout(timer);
                }
            }, []);

            const closePromoPopup = () => {
                setShowPromoPopup(false);
                sessionStorage.setItem('rikunali-promo-popup', 'true');
            };

            useEffect(() => {
                lucide.createIcons();
            }, [lang, isMenuOpen, formStatus, showPromoPopup]); 

            const openLightbox = (src, alt) => {
                setSelectedImage(src);
                setSelectedImageAlt(alt);
            };

            const closeLightbox = () => {
                setSelectedImage(null);
                setSelectedImageAlt("");
            };

            const handleFormSubmit = (e) => {
                e.preventDefault();
                setFormStatus('submitting');
                
                // Simulation d'envoi API
                setTimeout(() => {
                    setFormStatus('success');
                    e.target.reset();
                }, 1500);
            };

            return (
                <div className="min-h-screen flex flex-col font-sans relative">
                    
                    {/* POPUP & CONTROLS */}
                    {showPromoPopup && <PromoPopup t={t} onClose={closePromoPopup} />}
                    <FloatingControls />
                    <CookieBanner t={t} />
                    <Lightbox imageSrc={selectedImage} altText={selectedImageAlt} onClose={closeLightbox} />

                    {/* HEADER */}
                    <header className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'glass-nav py-2' : 'bg-transparent py-4'}`}>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                
                                <div className="flex-shrink-0 flex items-center cursor-pointer h-full py-1" onClick={() => window.scrollTo(0,0)}>
                                    <img 
                                        src="assets/logo-rikunali.webp" 
                                        alt="Rikunali Logo" 
                                        className="h-full w-auto max-h-16 object-contain"
                                        onError={(e) => {
                                            e.target.style.display = 'none';
                                            e.target.nextSibling.style.display = 'block';
                                        }}
                                    />
                                    <span className="font-serif text-2xl font-bold text-emerald-800 tracking-wider hidden pl-2">Rikunali</span>
                                </div>

                                {/* Navigation Desktop */}
                                <nav className="hidden md:flex space-x-6 items-center" role="navigation">
                                    <a href="#services" className={`font-medium hover:text-emerald-700 transition ${scrolled ? 'text-stone-600' : 'text-stone-100 hover:text-white drop-shadow-md'}`}>{t.nav.geo}</a>
                                    <a href="#services" className={`font-medium hover:text-emerald-700 transition ${scrolled ? 'text-stone-600' : 'text-stone-100 hover:text-white drop-shadow-md'}`}>{t.nav.healing}</a>
                                    <a href="#gallery" className={`font-medium hover:text-emerald-700 transition ${scrolled ? 'text-stone-600' : 'text-stone-100 hover:text-white drop-shadow-md'}`}>{t.nav.gallery}</a>
                                    <a href="#shop" className={`font-medium hover:text-emerald-700 transition ${scrolled ? 'text-stone-600' : 'text-stone-100 hover:text-white drop-shadow-md'}`}>{t.nav.shop}</a>
                                    <a href="#about" className={`font-medium hover:text-emerald-700 transition ${scrolled ? 'text-stone-600' : 'text-stone-100 hover:text-white drop-shadow-md'}`}>{t.nav.about}</a>
                                    <a href="#contact" className="px-5 py-2 bg-emerald-700 text-white rounded-full hover:bg-emerald-800 transition shadow-lg text-sm font-semibold tracking-wide">
                                        {t.nav.contact}
                                    </a>
                                    <div className={`border-l pl-4 ${scrolled ? 'border-stone-300' : 'border-stone-400'}`}>
                                        <LanguageSwitcher currentLang={lang} setLang={setLang} />
                                    </div>
                                </nav>

                                {/* Mobile Burger */}
                                <div className="md:hidden flex items-center space-x-4">
                                    <div className="bg-white/80 rounded px-1">
                                        <LanguageSwitcher currentLang={lang} setLang={setLang} />
                                    </div>
                                    <button 
                                        onClick={() => setIsMenuOpen(!isMenuOpen)} 
                                        className={`hover:text-emerald-700 ${scrolled ? 'text-stone-600' : 'text-white'}`}
                                        aria-label="Ouvrir le menu"
                                    >
                                        <Icon name={isMenuOpen ? "x" : "menu"} />
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Mobile Menu */}
                        {isMenuOpen && (
                            <div className="md:hidden bg-white/95 backdrop-blur border-t border-stone-100 fade-in absolute w-full shadow-xl h-screen">
                                <div className="px-4 pt-4 pb-6 space-y-4 flex flex-col items-center mt-10">
                                    <a href="#services" onClick={()=>setIsMenuOpen(false)} className="block px-3 py-2 text-2xl text-stone-600 hover:text-emerald-800">{t.nav.geo}</a>
                                    <a href="#services" onClick={()=>setIsMenuOpen(false)} className="block px-3 py-2 text-2xl text-stone-600 hover:text-emerald-800">{t.nav.healing}</a>
                                    <a href="#gallery" onClick={()=>setIsMenuOpen(false)} className="block px-3 py-2 text-2xl text-stone-600 hover:text-emerald-800">{t.nav.gallery}</a>
                                    <a href="#shop" onClick={()=>setIsMenuOpen(false)} className="block px-3 py-2 text-2xl text-stone-600 hover:text-emerald-800">{t.nav.shop}</a>
                                    <a href="#about" onClick={()=>setIsMenuOpen(false)} className="block px-3 py-2 text-2xl text-stone-600 hover:text-emerald-800">{t.nav.about}</a>
                                    <a href="#contact" onClick={()=>setIsMenuOpen(false)} className="block px-6 py-3 text-white font-bold bg-emerald-700 rounded-full mt-4">{t.nav.contact}</a>
                                </div>
                            </div>
                        )}
                    </header>

                    {/* HERO SECTION */}
                    <section className="relative h-screen flex items-center justify-center text-center overflow-hidden">
                        <video 
                            autoPlay 
                            muted 
                            loop 
                            playsInline 
                            poster="assets/rikunali-portrait.webp" /* Poster pour chargement rapide */
                            className="absolute inset-0 w-full h-full object-cover z-0"
                            src="assets/rikunali-geobiologie-soins-energetiques-suisse.mp4"
                        >
                            Your browser does not support the video tag.
                        </video>
                        <div className="absolute inset-0 video-overlay z-10"></div>
                        <div className="relative max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 z-20 pt-20">
                            <h1 className="text-4xl md:text-6xl lg:text-7xl font-serif font-bold text-white mb-8 leading-tight fade-in drop-shadow-lg">
                                {t.hero.title}
                            </h1>
                            <p className="text-xl md:text-2xl text-stone-100 mb-10 max-w-3xl mx-auto font-light drop-shadow-md">
                                {t.hero.subtitle}
                            </p>
                            <a href="#contact" className="inline-block bg-white/10 backdrop-blur-sm border border-white/50 hover:bg-white hover:text-emerald-900 text-white font-semibold py-4 px-10 rounded-full transition duration-300 transform hover:scale-105">
                                {t.hero.cta}
                            </a>
                        </div>
                        <div className="absolute bottom-10 left-1/2 transform -translate-x-1/2 z-20 text-white animate-bounce cursor-pointer" onClick={() => document.getElementById('services').scrollIntoView({behavior: 'smooth'})}>
                            <Icon name="chevron-down" size={32} />
                        </div>
                    </section>

                    {/* SERVICES SECTION */}
                    <section id="services" className="py-24 bg-stone-50 relative z-30">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-20">
                                <span className="text-emerald-700 text-sm font-bold tracking-widest uppercase mb-2 block">Domaines d'intervention</span>
                                <h2 className="text-4xl md:text-5xl font-serif text-stone-800">{t.services.title}</h2>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <article className="group bg-white p-10 rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1">
                                    <div className="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-800 mb-6 group-hover:bg-emerald-800 group-hover:text-white transition-colors duration-300">
                                        <Icon name="home" size={32} />
                                    </div>
                                    <h3 className="text-2xl font-serif font-bold mb-4 text-stone-800">{t.services.geo_title}</h3>
                                    <p className="text-stone-600 leading-relaxed mb-6">
                                        {t.services.geo_desc}
                                    </p>
                                    <a href="#contact" className="text-emerald-700 font-semibold hover:text-emerald-900 flex items-center">
                                        En savoir plus <Icon name="arrow-right" size={16} className="ml-2" />
                                    </a>
                                </article>
                                <article className="group bg-white p-10 rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1">
                                    <div className="w-16 h-16 bg-amber-50 rounded-full flex items-center justify-center text-amber-700 mb-6 group-hover:bg-amber-600 group-hover:text-white transition-colors duration-300">
                                        <Icon name="sun" size={32} />
                                    </div>
                                    <h3 className="text-2xl font-serif font-bold mb-4 text-stone-800">{t.services.heal_title}</h3>
                                    <p className="text-stone-600 leading-relaxed mb-6">
                                        {t.services.heal_desc}
                                    </p>
                                    <a href="#contact" className="text-amber-700 font-semibold hover:text-amber-900 flex items-center">
                                        En savoir plus <Icon name="arrow-right" size={16} className="ml-2" />
                                    </a>
                                </article>
                                <article className="group bg-white p-10 rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1" id="shop">
                                    <div className="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center text-stone-600 mb-6 group-hover:bg-stone-600 group-hover:text-white transition-colors duration-300">
                                        <Icon name="gem" size={32} />
                                    </div>
                                    <h3 className="text-2xl font-serif font-bold mb-4 text-stone-800">{t.services.shop_title}</h3>
                                    <p className="text-stone-600 leading-relaxed mb-6">
                                        {t.services.shop_desc}
                                    </p>
                                    <span className="text-stone-500 text-sm italic border-b border-stone-200 pb-1">Bientôt disponible en ligne</span>
                                </article>
                            </div>
                        </div>
                    </section>

                    {/* GALERIE ARTISTIQUE */}
                    <section id="gallery" className="py-24 bg-stone-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <span className="text-emerald-700 text-sm font-bold tracking-widest uppercase mb-2 block">L'Art Vibratoire</span>
                                <h2 className="text-4xl md:text-5xl font-serif text-stone-800 mb-4">{t.gallery.title}</h2>
                                <p className="text-stone-600 max-w-2xl mx-auto">{t.gallery.subtitle}</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {/* Image 1 : Mandala Bleu */}
                                <div 
                                    className="gallery-item relative group overflow-hidden rounded-xl shadow-lg aspect-square cursor-zoom-in"
                                    onClick={() => openLightbox('assets/oeuvre-mandala-bleu.webp', t.gallery.item1)}
                                >
                                    <img 
                                        src="assets/oeuvre-mandala-bleu.webp" 
                                        alt={t.gallery.item1} 
                                        loading="lazy"
                                        className="gallery-img w-full h-full object-cover"
                                    />
                                    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                                        <span className="text-white font-serif text-xl">{t.gallery.item1}</span>
                                    </div>
                                </div>

                                {/* Image 2 : Portrait Tribal */}
                                <div 
                                    className="gallery-item relative group overflow-hidden rounded-xl shadow-lg aspect-[3/4] cursor-zoom-in md:row-span-2"
                                    onClick={() => openLightbox('assets/oeuvre-portrait-tribal.webp', t.gallery.item2)}
                                >
                                    <img 
                                        src="assets/oeuvre-portrait-tribal.webp" 
                                        alt={t.gallery.item2} 
                                        loading="lazy"
                                        className="gallery-img w-full h-full object-cover"
                                    />
                                    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                                        <span className="text-white font-serif text-xl">{t.gallery.item2}</span>
                                    </div>
                                </div>

                                {/* Image 3 : Fresque Amazonie */}
                                <div 
                                    className="gallery-item relative group overflow-hidden rounded-xl shadow-lg aspect-square cursor-zoom-in"
                                    onClick={() => openLightbox('assets/oeuvre-fresque-amazonie.webp', t.gallery.item3)}
                                >
                                    <img 
                                        src="assets/oeuvre-fresque-amazonie.webp" 
                                        alt={t.gallery.item3} 
                                        loading="lazy"
                                        className="gallery-img w-full h-full object-cover"
                                    />
                                    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                                        <span className="text-white font-serif text-xl">{t.gallery.item3}</span>
                                    </div>
                                </div>

                                {/* Image 4 : Lumière Intérieure */}
                                <div 
                                    className="gallery-item relative group overflow-hidden rounded-xl shadow-lg aspect-[3/4] cursor-zoom-in md:row-span-2 lg:col-start-3 lg:row-start-1"
                                    onClick={() => openLightbox('assets/oeuvre-lumiere-interieure.webp', t.gallery.item4)}
                                >
                                    <img 
                                        src="assets/oeuvre-lumiere-interieure.webp" 
                                        alt={t.gallery.item4} 
                                        loading="lazy"
                                        className="gallery-img w-full h-full object-cover"
                                    />
                                    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                                        <span className="text-white font-serif text-xl">{t.gallery.item4}</span>
                                    </div>
                                </div>

                                {/* Image 5 : Vision Nature */}
                                <div 
                                    className="gallery-item relative group overflow-hidden rounded-xl shadow-lg aspect-square cursor-zoom-in lg:col-start-1"
                                    onClick={() => openLightbox('assets/oeuvre-vision-nature.webp', t.gallery.item5)}
                                >
                                    <img 
                                        src="assets/oeuvre-vision-nature.webp" 
                                        alt={t.gallery.item5} 
                                        loading="lazy"
                                        className="gallery-img w-full h-full object-cover"
                                    />
                                    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                                        <span className="text-white font-serif text-xl">{t.gallery.item5}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* PARALLAX */}
                    <div className="relative h-96 bg-fixed bg-center bg-cover bg-no-repeat" style={{backgroundImage: "url('https://images.unsplash.com/photo-1518531933037-9a60aa2071a9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80')"}}>
                        <div className="absolute inset-0 bg-emerald-900/40 flex items-center justify-center">
                            <p className="text-white text-3xl md:text-4xl font-serif italic text-center px-4 max-w-4xl">
                                "L'invisible est la racine du visible."
                            </p>
                        </div>
                    </div>

                    {/* ABOUT SECTION */}
                    <section id="about" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex flex-col lg:flex-row items-center gap-16">
                                <div className="lg:w-1/2 relative">
                                    <div className="absolute -top-4 -left-4 w-24 h-24 bg-stone-100 rounded-full z-0"></div>
                                    <div className="absolute -bottom-4 -right-4 w-32 h-32 bg-emerald-50 rounded-full z-0"></div>
                                    
                                    <div className="relative z-10 rounded-xl overflow-hidden shadow-2xl h-[600px] w-full group">
                                        <img 
                                            src="assets/rikunali-portrait.webp" 
                                            alt="Rikunali Portrait" 
                                            loading="lazy"
                                            className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                                        />
                                        <div className="absolute bottom-4 right-4 bg-white/90 p-2 rounded-lg shadow-lg backdrop-blur-sm">
                                            <img 
                                                src="assets/rikunali-logo-carre.webp" 
                                                alt="Sceau Rikunali"
                                                loading="lazy"
                                                className="w-20 h-20 object-contain opacity-90"
                                            />
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:w-1/2">
                                    <h2 className="text-4xl md:text-5xl font-serif font-bold text-stone-800 mb-8">{t.about.title}</h2>
                                    <p className="text-lg text-stone-600 mb-6 leading-relaxed">
                                        {t.about.desc1}
                                    </p>
                                    <p className="text-lg text-stone-600 mb-10 leading-relaxed font-light">
                                        {t.about.desc2}
                                    </p>
                                    
                                    <div className="grid grid-cols-2 gap-8 border-t border-stone-100 pt-8">
                                        <div>
                                            <span className="text-4xl font-bold text-emerald-800 block mb-1">15+</span>
                                            <span className="text-sm text-stone-500 uppercase tracking-wide">{t.about.stats_exp}</span>
                                        </div>
                                        <div>
                                            <div className="text-4xl font-bold text-emerald-800 block mb-1">
                                                <Icon name="map-pin" size={36} className="inline-block" />
                                            </div>
                                            <span className="text-sm text-stone-500 uppercase tracking-wide">{t.about.stats_loc}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CONTACT SECTION */}
                    <section id="contact" className="py-24 bg-stone-100">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row">
                                <div className="md:w-5/12 bg-emerald-800 p-10 text-white flex flex-col justify-between">
                                    <div>
                                        <h3 className="text-2xl font-serif mb-6">Contact</h3>
                                        <p className="text-emerald-100 mb-8 leading-relaxed">
                                            Rikunali<br/>
                                            Les Murmures du Silence
                                        </p>
                                        <div className="space-y-4">
                                            <div className="flex items-center space-x-3 text-emerald-100">
                                                <Icon name="phone" size={20} />
                                                <a href="tel:+41765483217" className="hover:text-white transition">076 548 32 17</a>
                                            </div>
                                            <div className="flex items-center space-x-3 text-emerald-100">
                                                <Icon name="mail" size={20} />
                                                <a href="mailto:esprit@rikunali.ch" className="hover:text-white transition">esprit@rikunali.ch</a>
                                            </div>
                                            <div className="flex items-center space-x-3 text-emerald-100">
                                                <Icon name="map-pin" size={20} />
                                                <span>Suisse Romande</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-12 flex space-x-4">
                                        <a href="#" target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-emerald-700 flex items-center justify-center hover:bg-emerald-600 transition" aria-label="Instagram"><Icon name="instagram" size={20} /></a>
                                        <a href="#" target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-emerald-700 flex items-center justify-center hover:bg-emerald-600 transition" aria-label="Facebook"><Icon name="facebook" size={20} /></a>
                                    </div>
                                </div>
                                
                                <div className="md:w-7/12 p-10">
                                    <h2 className="text-3xl font-serif font-bold text-stone-800 mb-2">{t.contact.title}</h2>
                                    <p className="text-stone-500 mb-8 text-sm">{t.contact.info}</p>
                                    
                                    <form className="space-y-5" onSubmit={handleFormSubmit}>
                                        <div>
                                            <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2">{t.contact.form_name}</label>
                                            <input type="text" name="name" required minLength="2" className="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-lg focus:ring-2 focus:ring-emerald-600 focus:bg-white outline-none transition" disabled={formStatus === 'submitting'} />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2">{t.contact.form_email}</label>
                                            <input type="email" name="email" required className="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-lg focus:ring-2 focus:ring-emerald-600 focus:bg-white outline-none transition" disabled={formStatus === 'submitting'} />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2">{t.contact.form_msg}</label>
                                            <textarea name="message" required rows="4" className="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-lg focus:ring-2 focus:ring-emerald-600 focus:bg-white outline-none transition" disabled={formStatus === 'submitting'}></textarea>
                                        </div>
                                        
                                        <button 
                                            type="submit" 
                                            className={`w-full font-bold py-4 px-6 rounded-lg transition transform hover:-translate-y-1 shadow-lg flex items-center justify-center ${
                                                formStatus === 'success' 
                                                ? 'bg-green-600 text-white' 
                                                : 'bg-stone-800 text-white hover:bg-stone-900'
                                            }`}
                                            disabled={formStatus === 'submitting'}
                                        >
                                            {formStatus === 'submitting' && <Icon name="loader" className="animate-spin mr-2" />}
                                            {formStatus === 'success' ? t.contact.success : t.contact.btn}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="bg-stone-900 text-stone-400 py-12 border-t border-stone-800">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="text-center md:text-left">
                                <span className="text-2xl font-serif font-bold text-white tracking-wider">Rikunali</span>
                                <p className="text-xs mt-2 text-stone-500">© 2025 Rikunali. Tous droits réservés.</p>
                            </div>
                            <div className="flex space-x-8 text-sm font-medium">
                                <a href="#" className="hover:text-white transition">Mentions Légales</a>
                                <a href="#" className="hover:text-white transition">Confidentialité</a>
                                <a href="#" className="hover:text-white transition">CGV</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
