                        <a href="#contact" class="inline-block bg-white/10 backdrop-blur-sm border border-white/50 hover:bg-white hover:text-emerald-900 text-white font-semibold py-4 px-10 rounded-full transition duration-300 transform hover:scale-105" data-i18n-hero-cta>${t.hero.cta}</a>

                    <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 z-20 text-white animate-bounce cursor-pointer" id="scroll-down">
                        <i data-lucide="chevron-down" width="32" height="32"></i>
                    </div>
                </section>

                <!-- SERVICES -->
                <section id="services" class="py-24 bg-stone-50 relative z-30">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="text-center mb-20">
                            <span class="text-emerald-700 text-sm font-bold tracking-widest uppercase mb-2 block" data-i18n-services-subtitle>Domaines d'intervention</span>
                            <h2 class="text-4xl md:text-5xl font-serif text-stone-800" data-i18n-services-title>${t.services.title}</h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <article class="group bg-white p-10 rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1">
                                <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-800 mb-6 group-hover:bg-emerald-800 group-hover:text-white transition-colors duration-300"><i data-lucide="home" width="32" height="32"></i></div>
                                <h3 class="text-2xl font-serif font-bold mb-4 text-stone-800" data-i18n-geo-title>${t.services.geo_title}</h3>
                                <p class="text-stone-600 leading-relaxed mb-6" data-i18n-geo-desc>${t.services.geo_desc}</p>
                                <a href="#contact" class="text-emerald-700 font-semibold hover:text-emerald-900 flex items-center">En savoir plus <i data-lucide="arrow-right" width="16" height="16" class="ml-2"></i></a>
                            </article>
                            <article class="group bg-white p-10 rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1">
                                <div class="w-16 h-16 bg-amber-50 rounded-full flex items-center justify-center text-amber-700 mb-6 group-hover:bg-amber-600 group-hover:text-white transition-colors duration-300"><i data-lucide="sun" width="32" height="32"></i></div>
                                <h3 class="text-2xl font-serif font-bold mb-4 text-stone-800" data-i18n-heal-title>${t.services.heal_title}</h3>
                                <p class="text-stone-600 leading-relaxed mb-6" data-i18n-heal-desc>${t.services.heal_desc}</p>
                                <a href="#contact" class="text-amber-700 font-semibold hover:text-amber-900 flex items-center">En savoir plus <i data-lucide="arrow-right" width="16" height="16" class="ml-2"></i></a>
                            </article>
                            <article class="group bg-white p-10 rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1" id="shop">
                                <div class="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center text-stone-600 mb-6 group-hover:bg-stone-600 group-hover:text-white transition-colors duration-300"><i data-lucide="gem" width="32" height="32"></i></div>
                                <h3 class="text-2xl font-serif font-bold mb-4 text-stone-800" data-i18n-shop-title>${t.services.shop_title}</h3>
                                <p class="text-stone-600 leading-relaxed mb-6" data-i18n-shop-desc>${t.services.shop_desc}</p>
                                <span class="text-stone-500 text-sm italic border-b border-stone-200 pb-1">Bientôt disponible en ligne</span>
                            </article>
                        </div>
                    </div>
                </section>

                <!-- GALERIE -->
                <section id="gallery" class="py-24 bg-stone-100">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="text-center mb-16">
                            <span class="text-emerald-700 text-sm font-bold tracking-widest uppercase mb-2 block" data-i18n-gallery-subtitle>L'Art Vibratoire</span>
                            <h2 class="text-4xl md:text-5xl font-serif text-stone-800 mb-4" data-i18n-gallery-title>${t.gallery.title}</h2>
                            <p class="text-stone-600 max-w-2xl mx-auto" data-i18n-gallery-subtitle2>${t.gallery.subtitle}</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${generateGalleryItems(t)}
                        </div>
                    </div>
                </section>

                <!-- PARALLAX -->
                <div class="relative h-96 bg-fixed bg-center bg-cover bg-no-repeat" style="background-image: url('https://images.unsplash.com/photo-1518531933037-9a60aa2071a9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
                    <div class="absolute inset-0 bg-emerald-900/40 flex items-center justify-center">
                        <p class="text-white text-3xl md:text-4xl font-serif italic text-center px-4 max-w-4xl">"L'invisible est la racine du visible."</p>
                    </div>
                </div>

                <!-- ABOUT -->
                <section id="about" class="py-24 bg-white">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex flex-col lg:flex-row items-center gap-16">
                            <div class="lg:w-1/2 relative">
                                <div class="absolute -top-4 -left-4 w-24 h-24 bg-stone-100 rounded-full z-0"></div>
                                <div class="absolute -bottom-4 -right-4 w-32 h-32 bg-emerald-50 rounded-full z-0"></div>
                                <div class="relative z-10 rounded-xl overflow-hidden shadow-2xl h-[600px] w-full group">
                                    <img src="assets/rikunali-portrait.webp" alt="Rikunali Portrait" loading="lazy" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                                    <div class="absolute bottom-4 right-4 bg-white/90 p-2 rounded-lg shadow-lg backdrop-blur-sm">
                                        <img src="assets/rikunali-logo-carre.webp" alt="Sceau Rikunali" loading="lazy" class="w-20 h-20 object-contain opacity-90">
                                    </div>
                                </div>
                            </div>
                            <div class="lg:w-1/2">
                                <h2 class="text-4xl md:text-5xl font-serif font-bold text-stone-800 mb-8" data-i18n-about-title>${t.about.title}</h2>
                                <p class="text-lg text-stone-600 mb-6 leading-relaxed" data-i18n-about-desc1>${t.about.desc1}</p>
                                <p class="text-lg text-stone-600 mb-10 leading-relaxed font-light" data-i18n-about-desc2>${t.about.desc2}</p>
                                <div class="grid grid-cols-2 gap-8 border-t border-stone-100 pt-8">
                                    <div><span class="text-4xl font-bold text-emerald-800 block mb-1">15+</span><span class="text-sm text-stone-500 uppercase tracking-wide" data-i18n-about-stats-exp>${t.about.stats_exp}</span></div>
                                    <div><div class="text-4xl font-bold text-emerald-800 block mb-1"><i data-lucide="map-pin" width="36" height="36" class="inline-block"></i></div><span class="text-sm text-stone-500 uppercase tracking-wide" data-i18n-about-stats-loc>${t.about.stats_loc}</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- CONTACT -->
                <section id="contact" class="py-24 bg-stone-100">
                    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row">
                            <div class="md:w-5/12 bg-emerald-800 p-10 text-white flex flex-col justify-between">
                                <div>
                                    <h3 class="text-2xl font-serif mb-6">Contact</h3>
                                    <p class="text-emerald-100 mb-8 leading-relaxed">Rikunali<br/>Les Murmures du Silence</p>
                                    <div class="space-y-4">
                                        <div class="flex items-center space-x-3 text-emerald-100"><i data-lucide="phone" width="20" height="20"></i><a href="tel:+41765483217" class="hover:text-white transition">076 548 32 17</a></div>
                                        <div class="flex items-center space-x-3 text-emerald-100"><i data-lucide="mail" width="20" height="20"></i><a href="mailto:esprit@rikunali.ch" class="hover:text-white transition">esprit@rikunali.ch</a></div>
                                        <div class="flex items-center space-x-3 text-emerald-100"><i data-lucide="map-pin" width="20" height="20"></i><span>Suisse Romande</span></div>
                                    </div>
                                </div>
                                <div class="mt-12 flex space-x-4">
                                    <a href="#" target="_blank" class="w-10 h-10 rounded-full bg-emerald-700 flex items-center justify-center hover:bg-emerald-600 transition" aria-label="Instagram"><i data-lucide="instagram" width="20" height="20"></i></a>
                                    <a href="#" target="_blank" class="w-10 h-10 rounded-full bg-emerald-700 flex items-center justify-center hover:bg-emerald-600 transition" aria-label="Facebook"><i data-lucide="facebook" width="20" height="20"></i></a>
                                </div>
                            </div>
                            <div class="md:w-7/12 p-10">
                                <h2 class="text-3xl font-serif font-bold text-stone-800 mb-2" data-i18n-contact-title>${t.contact.title}</h2>
                                <p class="text-stone-500 mb-8 text-sm" data-i18n-contact-info>${t.contact.info}</p>
                                <form id="contact-form" class="space-y-5" action="https://formspree.io/f/xxxxx" method="POST">
                                    <input type="hidden" name="_language" value="${currentLang}">
                                    <div>
                                        <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2" data-i18n-contact-name>${t.contact.form_name}</label>
                                        <input type="text" name="name" required minlength="2" class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-lg focus:ring-2 focus:ring-emerald-600 focus:bg-white outline-none transition">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2" data-i18n-contact-email>${t.contact.form_email}</label>
                                        <input type="email" name="email" required class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-lg focus:ring-2 focus:ring-emerald-600 focus:bg-white outline-none transition">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2" data-i18n-contact-msg>${t.contact.form_msg}</label>
                                        <textarea name="message" required rows="4" class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-lg focus:ring-2 focus:ring-emerald-600 focus:bg-white outline-none transition"></textarea>
                                    </div>
                                    <button type="submit" class="w-full font-bold py-4 px-6 rounded-lg transition transform hover:-translate-y-1 shadow-lg bg-stone-800 text-white hover:bg-stone-900 flex items-center justify-center" data-i18n-contact-btn>${t.contact.btn}</button>
                                    <div id="form-status" class="text-center text-sm mt-2 hidden"></div>
                                </form>
                            </div>
                        </div>
                    </div>
                </section>

                <footer class="bg-stone-900 text-stone-400 py-12 border-t border-stone-800">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="text-center md:text-left"><span class="text-2xl font-serif font-bold text-white tracking-wider">Rikunali</span><p class="text-xs mt-2 text-stone-500">© 2025 Rikunali. Tous droits réservés.</p></div>
                        <div class="flex space-x-8 text-sm font-medium"><a href="#" class="hover:text-white transition">Mentions Légales</a><a href="#" class="hover:text-white transition">Confidentialité</a><a href="#" class="hover:text-white transition">CGV</a></div>
                    </div>
                </footer>
            `;
            initLucide();
            attachEventListeners();
            updateLanguageSwitcher();
            handleScrollHeader();
            handleBackToTop();
            handleCookieBanner();
            handlePopup();
            handleLightbox();
            handleContactForm();
        }

        // Génération des éléments de galerie (évite duplication)
        function generateGalleryItems(t) {
            const images = [
                { src: 'assets/oeuvre-mandala-bleu.webp', alt: t.gallery.item1, class: 'aspect-square' },
                { src: 'assets/oeuvre-portrait-tribal.webp', alt: t.gallery.item2, class: 'aspect-[3/4] md:row-span-2' },
                { src: 'assets/oeuvre-fresque-amazonie.webp', alt: t.gallery.item3, class: 'aspect-square' },
                { src: 'assets/oeuvre-lumiere-interieure.webp', alt: t.gallery.item4, class: 'aspect-[3/4] md:row-span-2 lg:col-start-3 lg:row-start-1' },
                { src: 'assets/oeuvre-vision-nature.webp', alt: t.gallery.item5, class: 'aspect-square lg:col-start-1' }
            ];
            return images.map(img => `
                <div class="gallery-item relative group overflow-hidden rounded-xl shadow-lg ${img.class} cursor-zoom-in" data-src="${img.src}" data-alt="${img.alt}">
                    <img src="${img.src}" alt="${img.alt}" loading="lazy" class="gallery-img w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                        <span class="text-white font-serif text-xl">${img.alt}</span>
                    </div>
                </div>
            `).join('');
        }

        // Gestion des événements (lightbox, popup, cookies, etc.)
        function attachEventListeners() {
            // Scroll down button
            const scrollDown = document.getElementById('scroll-down');
            if (scrollDown) scrollDown.onclick = () => document.getElementById('services')?.scrollIntoView({ behavior: 'smooth' });
            // Logo home click
            const logo = document.getElementById('logo-home');
            if (logo) logo.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
            // Mobile menu toggle
            const menuToggle = document.getElementById('menu-toggle');
            const mobileMenu = document.getElementById('mobile-menu');
            if (menuToggle && mobileMenu) {
                menuToggle.onclick = () => {
                    const isOpen = mobileMenu.classList.contains('hidden');
                    mobileMenu.classList.toggle('hidden', !isOpen);
                    menuToggle.innerHTML = isOpen ? '<i data-lucide="x" width="28" height="28"></i>' : '<i data-lucide="menu" width="28" height="28"></i>';
                    initLucide();
                };
            }
            // Lightbox triggers
            document.querySelectorAll('.gallery-item').forEach(el => {
                el.onclick = (e) => {
                    const src = el.dataset.src;
                    const alt = el.dataset.alt;
                    if (src) openLightbox(src, alt);
                };
            });
        }

        function openLightbox(src, alt) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const caption = document.getElementById('lightbox-caption');
            if (lb && img && caption) {
                img.src = src;
                caption.textContent = alt;
                lb.style.display = 'flex';
                initLucide();
            }
        }

        function handleLightbox() {
            const lb = document.getElementById('lightbox');
            const closeBtn = document.getElementById('close-lightbox');
            if (closeBtn) closeBtn.onclick = () => { if (lb) lb.style.display = 'none'; };
            if (lb) lb.onclick = (e) => { if (e.target === lb) lb.style.display = 'none'; };
        }

        function handlePopup() {
            const popup = document.getElementById('promo-popup');
            if (!popup) return;
            const hasSeen = sessionStorage.getItem('rikunali-promo-popup');
            if (!hasSeen) {
                setTimeout(() => { popup.style.display = 'flex'; }, 5000);
            }
            const closePopup = () => {
                popup.style.display = 'none';
                sessionStorage.setItem('rikunali-promo-popup', 'true');
            };
            document.getElementById('close-popup')?.addEventListener('click', closePopup);
            document.getElementById('popup-close-btn')?.addEventListener('click', closePopup);
            document.getElementById('popup-overlay')?.addEventListener('click', closePopup);
            document.getElementById('popup-cta')?.addEventListener('click', closePopup);
        }

        function handleCookieBanner() {
            const banner = document.getElementById('cookie-banner');
            if (!banner) return;
            const consent = localStorage.getItem('rikunali-cookie-consent');
            if (!consent) banner.style.display = 'flex';
            const accept = document.getElementById('accept-cookies');
            const decline = document.getElementById('decline-cookies');
            if (accept) accept.onclick = () => { localStorage.setItem('rikunali-cookie-consent', 'accepted'); banner.style.display = 'none'; };
            if (decline) decline.onclick = () => { localStorage.setItem('rikunali-cookie-consent', 'declined'); banner.style.display = 'none'; };
        }

        function handleScrollHeader() {
            window.addEventListener('scroll', () => {
                const header = document.getElementById('main-header');
                const scrolled = window.scrollY > 50;
                if (header) {
                    header.classList.toggle('glass-nav', scrolled);
                    header.classList.toggle('bg-transparent', !scrolled);
                    header.classList.toggle('py-2', scrolled);
                    header.classList.toggle('py-4', !scrolled);
                }
                const backBtn = document.getElementById('back-to-top');
                if (backBtn) {
                    if (window.scrollY > 400) backBtn.classList.remove('opacity-0');
                    else backBtn.classList.add('opacity-0');
                }
            });
        }

        function handleBackToTop() {
            const btn = document.getElementById('back-to-top');
            if (btn) btn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleContactForm() {
            const form = document.getElementById('contact-form');
            if (!form) return;
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(form);
                const statusDiv = document.getElementById('form-status');
                const submitBtn = form.querySelector('button[type="submit"]');
                if (statusDiv) statusDiv.classList.add('hidden');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i data-lucide="loader" class="animate-spin mr-2" width="20" height="20"></i> Envoi...';
                initLucide();
                try {
                    // Utilisation de Formspree (remplacer xxxxx par ton ID)
                    const response = await fetch(form.action, { method: 'POST', body: formData, headers: { 'Accept': 'application/json' } });
                    if (response.ok) {
                        statusDiv.textContent = content[currentLang].contact.success;
                        statusDiv.classList.remove('hidden', 'text-red-600');
                        statusDiv.classList.add('text-green-600', 'block');
                        form.reset();
                    } else {
                        throw new Error('Erreur');
                    }
                } catch (err) {
                    statusDiv.textContent = "Une erreur s'est produite. Merci de réessayer ou d'envoyer un email directement.";
                    statusDiv.classList.remove('hidden', 'text-green-600');
                    statusDiv.classList.add('text-red-600', 'block');
                }
                submitBtn.disabled = false;
                submitBtn.innerHTML = content[currentLang].contact.btn;
                initLucide();
            });
        }

        // Changement de langue dynamique (sans re-render complet, mais on re-render pour simplifier)
        function setLanguage(lang) {
            currentLang = lang;
            render();
        }

        function updateLanguageSwitcher() {
            const languages = [
                { code: 'fr', label: 'FR' },
                { code: 'de', label: 'DE' },
                { code: 'en', label: 'EN' },
                { code: 'it', label: 'IT' },
                { code: 'es', label: 'ES' }
            ];
            const desktopContainer = document.getElementById('language-switcher-desktop');
            const mobileContainer = document.getElementById('language-switcher-mobile');
            const switcherHtml = (containerClass) => `
                <div class="flex space-x-1" aria-label="Choisir la langue">
                    ${languages.map(lang => `
                        <button class="lang-btn text-xs font-semibold px-2 py-1 rounded transition-colors ${currentLang === lang.code ? 'bg-emerald-800 text-white' : 'text-stone-600 hover:text-emerald-800 hover:bg-stone-200'}" data-lang="${lang.code}">${lang.label}</button>
                    `).join('')}
                </div>
            `;
            if (desktopContainer) desktopContainer.innerHTML = switcherHtml('desktop');
            if (mobileContainer) mobileContainer.innerHTML = switcherHtml('mobile');
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const newLang = btn.dataset.lang;
                    if (newLang) setLanguage(newLang);
                });
            });
        }

        // Initialisation
        render();
    </script>
</body>
</html>
